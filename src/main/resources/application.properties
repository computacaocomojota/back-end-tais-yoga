# ===============================
# Configurações do Servidor
# ===============================
# O Railway injeta dinamicamente a variável PORT no container
server.port=${PORT:8080}

# ===============================
# Configurações do Banco MySQL
# ===============================
# Suporte para ler arquivo .env na raiz do projeto (Spring Boot 2.4+)
spring.config.import=optional:file:.env[.properties]

# Suporta variáveis automáticas do Railway (MYSQLHOST, etc.) ou variáveis manuais (DB_HOST, etc.)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:${DB_HOST:localhost}}:${MYSQLPORT:${DB_PORT:3306}}/${MYSQLDATABASE:${DB_NAME:taisyoga_db}}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:${DB_USER:taisyoga_user}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD:taisyoga_password}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Fallback para root caso o usuário rode no MySQL local padrão
# spring.datasource.username=root
# spring.datasource.password=root

# ===============================
# Configurações JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# Configurações de Segurança / JWT
# ===============================
api.security.jwt.secret=${JWT_SECRET:fallback-dev-secret-mude-esta-chave-em-producao}
api.security.jwt.expiration=86400000

# ===============================
# Configurações de E-mail (Gmail SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:taisyogacontato@gmail.com}
spring.mail.password=${MAIL_PASSWORD:suasenhaapp}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

